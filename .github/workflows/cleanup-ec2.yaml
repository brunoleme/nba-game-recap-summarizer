name: Cleanup EC2 Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to cleanup'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      confirm_destroy:
        description: 'Type "DESTROY" to confirm cleanup'
        required: true
        type: string

env:
  AWS_REGION: us-east-1

jobs:
  cleanup-ec2:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Confirm destruction
      run: |
        if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
          echo "❌ Confirmation failed. You must type 'DESTROY' to proceed."
          exit 1
        fi
        echo "✅ Confirmation received. Proceeding with cleanup..."

    - name: Destroy EC2 infrastructure
      run: |
        cd terraform/ec2
        terraform init -reconfigure
        terraform destroy -auto-approve

    - name: Verify cleanup
      run: |
        echo "🧹 EC2 cleanup completed for environment: ${{ github.event.inputs.environment }}"
        echo "All EC2 instances, VPC, and associated resources have been destroyed."
