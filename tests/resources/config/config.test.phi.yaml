project_name: "nba-recap-finetune-test"

logging:
  log_path: "logs"

model:
  type: "phi"
  name: "microsoft/Phi-3.5-mini-instruct"  # Use actual Phi-3.5-mini for testing
  quantization: false  # Disable quantization for faster testing
  quantization_type: "4bit"
  peft_method: "lora"
  max_length: 128  # Very small context for fast testing

lora:
  r: 4
  alpha: 4
  dropout: 0.1
  prompt_tuning_n_tokens: 8

training:
  batch_size: 2  # Small batch for testing
  accumulate_grad_batches: 2
  learning_rate: 1e-5
  warmup_steps: 10  # Very short for testing
  weight_decay: 0.0
  patience: 2
  precision: "16-mixed"
  gradient_clip_val: 1.0
  max_epochs: 1  # Single epoch for testing
  num_workers: 2
  model_artifact_dir: "tests/resources/artifacts"
  devices: "auto"
  gradient_checkpointing: false  # Disable for faster testing

data:
  train_samples: 5   # Very small dataset for testing
  val_samples: 3
  test_samples: 3
  shuffle: false
  shuffle_seed: 42
  shuffle_buffer_size: 32
  source_data_folder: "tests/resources"
  source_data_path: "source_data/game_recaps_with_summaries_sample.csv"
  preprocessed_output_data_folder: "tests/resources"
  preprocessed_input_data_folder: "tests/resources"
  apply_quality_filters: true
  min_summary_length: 5
  min_recap_length: 20
  max_length_ratio: 0.8
  min_length_ratio: 0.01

evaluation:
  model_artifact_dir: "tests/resources/artifacts"
  test_samples_lexical_metrics: 2
  test_samples_semantic_metrics: 2
  test_samples_ai_as_judge_metrics: 2

# Keep Hydra from changing cwd or writing to unique run dirs in tests
hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
