project_name: "nba-recap-finetune-test"

logging:
  log_path: "logs"

model:
  type: "llama"  # Use LLaMA type since TinyLlama is LLaMA-compatible
  name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"  # Use TinyLlama as Phi substitute
  quantization: false
  quantization_type: "4bit"
  peft_method: "lora"
  max_length: 64  # Very small context for ultra-fast testing

lora:
  r: 2
  alpha: 2
  dropout: 0.1
  prompt_tuning_n_tokens: 4

training:
  batch_size: 4
  accumulate_grad_batches: 1
  learning_rate: 1e-5
  warmup_steps: 5
  weight_decay: 0.0
  patience: 1
  precision: "16-mixed"
  gradient_clip_val: 1.0
  max_epochs: 1
  num_workers: 2
  model_artifact_dir: "tests/resources/artifacts"
  devices: "auto"
  gradient_checkpointing: false

data:
  train_samples: 3
  val_samples: 2
  test_samples: 2
  shuffle: false
  shuffle_seed: 42
  shuffle_buffer_size: 16
  source_data_folder: "tests/resources"
  source_data_path: "source_data/game_recaps_with_summaries_sample.csv"
  preprocessed_output_data_folder: "tests/resources"
  preprocessed_input_data_folder: "tests/resources"
  apply_quality_filters: true
  min_summary_length: 5
  min_recap_length: 20
  max_length_ratio: 0.8
  min_length_ratio: 0.01

evaluation:
  model_artifact_dir: "tests/resources/artifacts"
  test_samples_lexical_metrics: 1
  test_samples_semantic_metrics: 1
  test_samples_ai_as_judge_metrics: 1

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
