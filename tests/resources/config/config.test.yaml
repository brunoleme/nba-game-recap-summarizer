project_name: "nba-recap-finetune-test"

logging:
  log_path: "logs"

model:
  type: "llama"
  name: "meta-llama/Llama-3.2-1B-Instruct"
  quantization: true
  quantization_type: "4bit"
  peft_method: "lora"
  max_length: 4096

lora:
  r: 4
  alpha: 4
  dropout: 0.1
  prompt_tuning_n_tokens: 8

training:
  batch_size: 4
  accumulate_grad_batches: 4
  learning_rate: 1e-5
  warmup_steps: 250
  weight_decay: 0.0
  patience: 3
  precision: "16-mixed"        # if your trainer exposes this; T4 => fp16
  gradient_clip_val: 1.0
  max_epochs: 3
  num_workers: 4
  model_artifact_dir: "/opt/ml/processing/output/model-artifacts"
  devices: "auto"

data:
  train_samples: 10
  val_samples: 2
  test_samples: 2
  shuffle: false
  shuffle_seed: 42
  train_split: 0.5
  val_split: 0.25
  test_split: 0.25
  shuffle_buffer_size: 128
  source_data_folder: "tests/resources"
  source_data_path: "source_data/game_recaps_with_summaries_sample.csv"
  preprocessed_output_data_folder: "tests/resources"      # tests override this anyway
  preprocessed_input_data_folder: "tests/resources" # app appends /preprocessed

evaluation:
  model_artifact_dir: "tests/resources/artifacts"   # <- must match training
  test_samples_lexical_metrics: 2
  test_samples_semantic_metrics: 2
  test_samples_ai_as_judge_metrics: 2

# Keep Hydra from changing cwd or writing to unique run dirs in tests
hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
