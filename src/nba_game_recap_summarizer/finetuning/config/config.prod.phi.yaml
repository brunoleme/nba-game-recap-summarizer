project_name: "nba-recap-finetune-prod-phi"

logging:
  log_path: "logs"

model:
  type: "phi"
  name: "microsoft/Phi-3.5-mini-instruct"
  quantization: true
  quantization_type: "4bit"
  peft_method: "lora"
  max_length: 4096  # Phi-3.5-mini supports much longer context!

lora:
  r: 16  # Higher rank for production
  alpha: 16
  dropout: 0.1
  prompt_tuning_n_tokens: 20

training:
  batch_size: 4  # Larger batch size for production
  accumulate_grad_batches: 2
  learning_rate: 1e-5  # Lower learning rate for production
  warmup_steps: 1000
  weight_decay: 0.01
  patience: 10
  precision: "16-mixed"
  gradient_clip_val: 1.0
  max_epochs: 20  # More epochs for production
  num_workers: 4
  model_artifact_dir: "artifacts"
  devices: "auto"
  gradient_checkpointing: true
  enable_model_summary: false
  log_every_n_steps: 10
  sync_batchnorm: false
  deterministic: false
  benchmark: false
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  val_check_interval: 0.5
  check_val_every_n_epoch: 1
  lr_scheduler:
    name: "linear_warmup"
    T_max: 20
    eta_min: 1e-6
    step_size: 2
    gamma: 0.5

data:
  train_samples: 5000  # Full dataset for production
  val_samples: 1000
  test_samples: 1000
  shuffle: true
  shuffle_seed: 42
  shuffle_buffer_size: 128
  source_data_folder: "data"
  source_data_path: "source_data/game_recaps_with_summaries.csv"
  preprocessed_output_data_folder: "data"
  preprocessed_input_data_folder: "data"
  apply_quality_filters: true
  min_summary_length: 5
  min_recap_length: 20
  max_length_ratio: 0.8
  min_length_ratio: 0.01

evaluation:
  model_artifact_dir: "artifacts"
  test_samples_lexical_metrics: 500
  test_samples_semantic_metrics: 200
  test_samples_ai_as_judge_metrics: 100

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
