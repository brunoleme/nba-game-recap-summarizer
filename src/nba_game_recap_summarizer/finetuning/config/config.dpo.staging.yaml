project_name: "nba-recap-dpo"

logging:
  log_path: "logs"

model:
  type: "llama"
  name: "meta-llama/Llama-3.2-1B-Instruct"
  quantization: false        # Match Colab: use FP16 unquantized for better DPO training
  quantization_type: "4bit"
  peft_method: "lora"
  max_length: 1536

lora:
  r: 16
  alpha: 32
  dropout: 0.1

dpo:
  beta: 0.1

training:
  batch_size: 4              # Match Colab: batch_size=4, grad_accum=4 → effective 16
  accumulate_grad_batches: 4 # Match Colab effective batch size
  learning_rate: 1e-5
  warmup_steps: 50
  weight_decay: 0.01
  patience: 5
  precision: "16-mixed"
  gradient_clip_val: 1.0
  max_epochs: 1
  num_workers: 2
  log_every_n_steps: 1  # Match Colab: log every step to see all 38 steps
  gradient_checkpointing: false
  model_artifact_dir: "/opt/ml/processing/output/model-artifacts"
  devices: "auto"

lengths:
  max_prompt_length: 512
  max_completion_length: 256
  input_max_length: 2048
  max_new_tokens: 512

data:
  # Expect a CSV with columns: prompt, chosen, rejected, game_recap (optional)
  preference_pairs_csv: "/opt/ml/processing/input/preprocessed/game_recaps_with_rewritten_curated_summaries.csv"
  test_size: 0.1
  split_seed: 42

evaluation:
  num_samples: 20
  reports_dir: "/opt/ml/processing/output/model-artifacts/${oc.env:PIPELINE_RUN_ID}/reports"

outputs:
  output_dir: "/opt/ml/processing/output/model-artifacts/${oc.env:PIPELINE_RUN_ID}"
  save_hf_model_merged_aligned: true
  save_hf_model_merged_unquantized_aligned: false

