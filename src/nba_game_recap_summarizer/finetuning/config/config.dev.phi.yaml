project_name: "nba-recap-finetune-dev-phi"

logging:
  log_path: "logs"

model:
  type: "phi"
  name: "microsoft/Phi-3.5-mini-instruct"
  quantization: true
  quantization_type: "4bit"
  peft_method: "lora"
  max_length: 2048  # Smaller context for dev testing

lora:
  r: 4  # Lower rank for dev
  alpha: 4
  dropout: 0.1
  prompt_tuning_n_tokens: 10

training:
  batch_size: 1  # Small batch for dev
  accumulate_grad_batches: 8
  learning_rate: 2e-5
  warmup_steps: 100
  weight_decay: 0.01
  patience: 3
  precision: "16-mixed"
  gradient_clip_val: 1.0
  max_epochs: 3  # Few epochs for dev
  num_workers: 2
  model_artifact_dir: "artifacts"
  devices: "auto"
  gradient_checkpointing: true
  enable_model_summary: false
  log_every_n_steps: 5
  sync_batchnorm: false
  deterministic: false
  benchmark: false
  limit_train_batches: 0.1  # Limit for dev
  limit_val_batches: 0.1
  val_check_interval: 0.5
  check_val_every_n_epoch: 1
  lr_scheduler:
    name: "linear_warmup"
    T_max: 3
    eta_min: 2e-6
    step_size: 1
    gamma: 0.5

data:
  train_samples: 100  # Small dataset for dev
  val_samples: 20
  test_samples: 20
  shuffle: true
  shuffle_seed: 42
  shuffle_buffer_size: 128
  source_data_folder: "data"
  source_data_path: "source_data/game_recaps_with_summaries.csv"
  preprocessed_output_data_folder: "data"
  preprocessed_input_data_folder: "data"
  apply_quality_filters: true
  min_summary_length: 5
  min_recap_length: 20
  max_length_ratio: 0.8
  min_length_ratio: 0.01

evaluation:
  model_artifact_dir: "artifacts"
  test_samples_lexical_metrics: 10
  test_samples_semantic_metrics: 5
  test_samples_ai_as_judge_metrics: 2

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
