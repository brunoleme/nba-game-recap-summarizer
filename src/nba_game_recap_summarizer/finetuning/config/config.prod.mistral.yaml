project_name: "nba-recap-finetune"

logging:
  log_path: "logs"

model:
  type: "mistral"
  name: "mistralai/Mistral-7B-Instruct-v0.3"
  quantization: true
  quantization_type: "4bit"
  peft_method: "lora"
  max_length: 3072  # Mistral-7B supports longer contexts

lora:
  r: 8
  alpha: 8
  dropout: 0.1
  prompt_tuning_n_tokens: 20

training:
  batch_size: 1  # Conservative for Mistral-7B on A10G GPU (24GB VRAM)
  accumulate_grad_batches: 4  # Effective batch size = 1 * 4 = 4
  learning_rate: 2e-5
  warmup_steps: 500
  weight_decay: 0.01
  patience: 3
  gradient_clip_val: 1.0
  max_epochs: 5
  num_workers: 4  # Increased for faster data loading
  model_artifact_dir: "/opt/ml/processing/output/model-artifacts"
  devices: "auto"
  precision: "16-mixed"
  gradient_checkpointing: true
  # Optimized for A10G GPU with Mistral-7B
  enable_model_summary: false
  log_every_n_steps: 50
  # Learning rate scheduling
  lr_scheduler:
    name: "linear_warmup"  # Options: linear_warmup, cosine, step
    T_max: 5  # For cosine scheduler
    eta_min: 2e-6  # For cosine scheduler
    step_size: 2  # For step scheduler
    gamma: 0.5  # For step scheduler

data:
  train_samples: 3500  # Use all available data for production
  val_samples: 500
  test_samples: 500
  shuffle: true        # Enable data shuffling for better training
  shuffle_seed: 42
  # Remove train_split, val_split, test_split - rely on train_samples, val_samples, test_samples
  shuffle_buffer_size: 5000
  source_data_folder: "/opt/ml/processing/input/source-data"
  source_data_path: "game_recaps_with_summaries.csv"
  preprocessed_output_data_folder: "/opt/ml/processing/output"
  preprocessed_input_data_folder: "/opt/ml/processing/input"
  # Data quality filtering settings
  apply_quality_filters: true
  min_summary_length: 10
  min_recap_length: 50
  max_length_ratio: 0.8
  min_length_ratio: 0.01

evaluation:
  model_artifact_dir: "/opt/ml/processing/input/model-artifacts"
  reports_dir: "/opt/ml/processing/output/reports-prod"
  test_samples_lexical_metrics: 750
  test_samples_semantic_metrics: 512
  test_samples_ai_as_judge_metrics: 256
