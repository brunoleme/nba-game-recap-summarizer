project_name: nba-recap-finetune-regularized

logging:
  log_path: logs

model:
  type: llama
  name: meta-llama/Llama-3.2-1B-Instruct
  quantization: false  # Disable quantization for testing
  quantization_type: 8bit
  peft_method: lora
  max_length: 2048  # Reduced from 4096 for memory efficiency

lora:
  r: 16  # Increased from 8 for more capacity
  alpha: 32  # Increased proportionally
  dropout: 0.2  # Increased dropout for more regularization
  prompt_tuning_n_tokens: 20

training:
  batch_size: 2  # Reduced from 4 for memory
  accumulate_grad_batches: 4  # Effective batch size = 2 * 4 = 8
  learning_rate: 5e-6  # Reduced from 1e-5 for more stable training
  warmup_steps: 200  # Increased warmup for lower LR
  weight_decay: 0.05  # Increased weight decay for more regularization
  patience: 5
  precision: 32  # Use full FP32 precision to avoid BFloat16 issues
  gradient_clip_val: 0.5  # Reduced gradient clipping for more stable training
  max_epochs: 5  # Reduced from 8 to prevent overfitting
  num_workers: 2
  rouge_eval_frequency: 5  # More frequent evaluation
  rouge_eval_samples: 2    # More samples for evaluation
  model_artifact_dir: ./checkpoints
  devices: auto
  gradient_checkpointing: true
  enable_model_summary: false
  log_every_n_steps: 5

data:
  train_samples: 1000  # Keep staging size for testing
  val_samples: 500     # Keep staging size for testing
  test_samples: 500    # Keep staging size for testing
  shuffle: true
  shuffle_seed: 42
  # Remove confusing split parameters - rely only on explicit sample counts
  source_data_folder: data/samples
  source_data_path: game_recaps_with_summaries.csv
  preprocessed_output_data_folder: ./output
  preprocessed_input_data_folder: ./data/samples

evaluation:
  model_artifact_dir: ./checkpoints
  reports_dir: ./reports
  test_samples_lexical_metrics: 50
  test_samples_semantic_metrics: 25
  test_samples_ai_as_judge_metrics: 10
