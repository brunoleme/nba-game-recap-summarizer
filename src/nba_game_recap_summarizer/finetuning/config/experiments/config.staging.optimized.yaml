project_name: nba-recap-finetune-optimized

logging:
  log_path: logs

model:
  type: llama
  name: meta-llama/Llama-3.2-1B-Instruct
  quantization: true
  quantization_type: 8bit  # Changed from 4bit for better stability
  peft_method: lora
  max_length: 2048  # Reduced from 4096 for memory efficiency

lora:
  r: 32  # Increased from 8 for more capacity
  alpha: 64  # Increased proportionally
  dropout: 0.1
  prompt_tuning_n_tokens: 20

training:
  batch_size: 2  # Reduced from 4 for memory
  accumulate_grad_batches: 4  # Effective batch size = 2 * 4 = 8
  learning_rate: 5e-6  # Reduced from 2e-5 for more stable training
  warmup_steps: 200  # Reduced from 500
  weight_decay: 0.01
  patience: 5
  precision: 16-mixed
  gradient_clip_val: 1.0
  max_epochs: 3  # Reduced from 8 to prevent overfitting
  num_workers: 2
  rouge_eval_frequency: 5  # More frequent evaluation
  rouge_eval_samples: 2    # More samples for evaluation
  model_artifact_dir: ./checkpoints
  devices: auto
  gradient_checkpointing: true
  enable_model_summary: false
  log_every_n_steps: 5

data:
  train_samples: -1  # Use ALL available data (134k+ samples)
  val_samples: -1    # Use ALL available validation data
  test_samples: -1   # Use ALL available test data
  shuffle: true
  shuffle_seed: 42
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  shuffle_buffer_size: 1000
  source_data_folder: data/samples
  source_data_path: game_recaps_with_summaries.csv
  preprocessed_output_data_folder: ./output
  preprocessed_input_data_folder: ./data/samples

evaluation:
  model_artifact_dir: ./checkpoints
  reports_dir: ./reports
  test_samples_lexical_metrics: 50
  test_samples_semantic_metrics: 25
  test_samples_ai_as_judge_metrics: 10