project_name: "nba-recap-finetune"

logging:
  log_path: "logs"

model:
  type: "llama"
  name: "meta-llama/Llama-3.2-1B-Instruct"  # Switch to LLaMA-3.2-1B for better performance
  quantization: true
  quantization_type: "4bit"
  peft_method: "lora"
  max_length: 2048  # LLaMA-3.2-1B works well with 2048 context

lora:
  r: 8  # Moderate for LLaMA-3.2-1B on G5 A10G (24GB VRAM)
  alpha: 16  # Proportional to r
  dropout: 0.05  # Lower dropout for smaller model
  prompt_tuning_n_tokens: 20

training:
  batch_size: 2  # Conservative for LLaMA-3.2-1B on G5 A10G (24GB VRAM)
  accumulate_grad_batches: 8  # Effective batch size = 2 * 8 = 16
  learning_rate: 2e-5  # Good learning rate for LLaMA
  warmup_steps: 100  # Reduced for smaller model
  weight_decay: 0.01  # Regularization
  patience: 3  # Reduced patience for faster iteration
  precision: "16-mixed"
  gradient_clip_val: 1.0
  max_epochs: 3  # Reduced for quick testing of tokenizer fix
  num_workers: 2  # Reduced for smaller model
  # ROUGE evaluation settings
  rouge_eval_frequency: 10  # Calculate ROUGE every 10 validation batches
  rouge_eval_samples: 1     # Number of samples to evaluate for ROUGE
  model_artifact_dir: "/opt/ml/processing/output/model-artifacts"
  devices: "auto"
  gradient_checkpointing: true
  # Memory optimization settings
  enable_model_summary: false
  log_every_n_steps: 10
  # Additional memory optimizations for A10G
  sync_batchnorm: false
  deterministic: false
  benchmark: false
  # Additional memory optimizations
  limit_train_batches: 1.0  # Use all training data
  limit_val_batches: 1.0    # Use all validation data
  # Memory management
  val_check_interval: 0.5    # Check validation every 50% of epoch
  check_val_every_n_epoch: 1 # Validate every epoch
  # Learning rate scheduling
  lr_scheduler:
    name: "linear_warmup"  # Options: linear_warmup, cosine, step
    T_max: 8  # For cosine scheduler
    eta_min: 1e-6  # For cosine scheduler
    step_size: 2  # For step scheduler
    gamma: 0.5  # For step scheduler

data:
  train_samples: 1000
  val_samples: 500
  test_samples: 500
  shuffle: true         # Enable data shuffling for better training
  shuffle_seed: 42      # Random seed for reproducibility
  # Remove train_split, val_split, test_split - rely on train_samples, val_samples, test_samples
  shuffle_buffer_size: 5000
  source_data_folder: "/opt/ml/processing/input/source-data"
  source_data_path: "game_recaps_with_summaries.csv"
  preprocessed_output_data_folder: "/opt/ml/processing/output"
  preprocessed_input_data_folder: "/opt/ml/processing/input"
  # Data quality filtering settings
  apply_quality_filters: true
  min_summary_length: 10
  min_recap_length: 50
  max_length_ratio: 0.8
  min_length_ratio: 0.01

evaluation:
  model_artifact_dir: "/opt/ml/processing/input/model-artifacts"
  reports_dir: "/opt/ml/processing/output/reports-staging"
  test_samples_lexical_metrics: 256
  test_samples_semantic_metrics: 128
  test_samples_ai_as_judge_metrics: 64
  