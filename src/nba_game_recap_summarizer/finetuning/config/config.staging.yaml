project_name: "nba-recap-finetune"

logging:
  log_path: "logs"

model:
  type: "llama"
  name: "meta-llama/Llama-3.2-1B-Instruct"
  quantization: true
  quantization_type: "4bit"
  peft_method: "lora"
  max_length: 4096  # Full sequence length with Tesla A10G (24GB)

lora:
  r: 8
  alpha: 8
  dropout: 0.1
  prompt_tuning_n_tokens: 20

training:
  batch_size: 2  # Optimized for Tesla A10G (24GB)
  accumulate_grad_batches: 2  # Effective batch size = 2 * 2 = 4
  learning_rate: 1e-5
  warmup_steps: 250
  weight_decay: 0.0
  patience: 3
  precision: "16-mixed"
  gradient_clip_val: 1.0
  max_epochs: 3
  num_workers: 2
  model_artifact_dir: "/opt/ml/processing/output/model-artifacts"
  devices: "auto"
  gradient_checkpointing: true
  # Optimized for Tesla A10G (24GB)
  enable_model_summary: false
  log_every_n_steps: 10

data:
  train_samples: 1000  # 42% of full dataset for staging
  val_samples: 500     # 42% of full dataset for staging
  test_samples: 500    # 42% of full dataset for staging
  shuffle: false        # Whether to shuffle datasets
  shuffle_seed: 42      # Random seed for reproducibility
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  shuffle_buffer_size: 5000
  source_data_folder: "/opt/ml/processing/input/source-data"
  source_data_path: "game_recaps_with_summaries.csv"
  preprocessed_output_data_folder: "/opt/ml/processing/output"
  preprocessed_input_data_folder: "/opt/ml/processing/input"

evaluation:
  model_artifact_dir: "/opt/ml/processing/input/model-artifacts"
  reports_dir: "/opt/ml/processing/output/reports-staging"
  test_samples_lexical_metrics: 1000
  test_samples_semantic_metrics: 1000
  test_samples_ai_as_judge_metrics: 64
  